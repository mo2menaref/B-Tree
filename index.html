<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .control-panel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
            min-width: 200px;
        }

        input[type="number"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-insert {
            background: #667eea;
            color: white;
        }

        .btn-insert:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-display {
            background: #48bb78;
            color: white;
        }

        .btn-display:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-clear {
            background: #f56565;
            color: white;
        }

        .btn-clear:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        .output-panel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 400px;
        }

        .output-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        #output {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
            color: #2d3748;
            max-height: 600px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }

        .info-box {
            background: #e6fffa;
            border-left: 4px solid #38b2ac;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box h3 {
            color: #2c7a7b;
            margin-bottom: 10px;
        }

        .info-box ul {
            list-style-position: inside;
            color: #234e52;
        }

        @media (max-width: 768px) {
            .control-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 B+ Tree Visualizer</h1>

        <div class="control-panel">
            <div class="info-box">
                <h3>ℹ️ About this B+ Tree</h3>
                <ul>
                    <li>Order: 3 (Maximum 2 keys per node)</li>
                    <li>Persistent storage in binary file</li>
                    <li>Operations: Insert, Display, Clear All</li>
                </ul>
            </div>

            <div class="control-group">
                <input type="number" id="valueInput" placeholder="Enter a number to insert" value="">
                <button class="btn-insert" onclick="insertValue()">Insert Value</button>
            </div>

            <div class="control-group">
                <button class="btn-display" onclick="displayTree()">Display Tree</button>
                <button class="btn-clear" onclick="clearTree()">Clear All Nodes</button>
            </div>
        </div>

        <div class="output-panel">
            <h2>📊 Tree Output</h2>
            <div id="output">Click "Display Tree" to see the current tree structure...</div>
        </div>
    </div>

    <script>
        // Function to send request to CGI program
        async function sendRequest(operation, value = null) {
            const output = document.getElementById('output');
            output.innerHTML = '<div class="loading">Processing...</div>';

            try {
                const formData = new FormData();
                formData.append('operation', operation);
                if (value !== null) {
                    formData.append('value', value);
                }

                const response = await fetch('/cgi-bin/bplus_tree.exe', {
                    method: 'POST',
                    body: formData
                });

                const text = await response.text();
                output.textContent = text;
            } catch (error) {
                output.textContent = 'Error: ' + error.message + '\n\nMake sure the web server is running correctly.';
            }
        }

        // Insert a value into the tree
        function insertValue() {
            const input = document.getElementById('valueInput');
            const value = parseInt(input.value);

            if (isNaN(value)) {
                alert('Please enter a valid number');
                return;
            }

            sendRequest('insert', value);
            input.value = '';
            input.focus();
        }

        // Display the tree structure
        function displayTree() {
            sendRequest('display');
        }

        // Clear all nodes
        function clearTree() {
            if (confirm('Are you sure you want to delete all nodes?')) {
                sendRequest('clear');
            }
        }

        // Allow Enter key to insert value
        document.getElementById('valueInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                insertValue();
            }
        });

        // Load tree on page load
        window.onload = function() {
            displayTree();
        };
    </script>
</body>
</html>
